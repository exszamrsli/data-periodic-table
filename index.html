<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Data Periodic Table</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#000;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--bg); color:#fff; font-family: Helvetica, Arial, sans-serif;
  }

  /* ---------- LOGIN SCREEN ---------- */
  #login-screen{
    position:fixed; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center,#111 0%,#000 100%);
  }
  #login-card{
    width:360px; padding:40px 32px; border-radius:12px;
    background:#0d0d0d; border:1px solid #222; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  #login-card h1{ font-size:20px; margin:0 0 8px; }
  #login-card p{ font-size:13px; color:#999; margin:0 0 24px; }
  #g_id_signin_container{ display:flex; justify-content:center; }
  #login-error{ color:#ff6b6b; font-size:12px; margin-top:16px; display:none; }

  /* ---------- 3D SCENE ---------- */
  #container{ position:fixed; inset:0; display:none; }

  .element {
    width: 120px; height: 160px;
    box-shadow: 0 0 12px rgba(0,255,200,0.4);
    border: 1px solid rgba(127,255,212,0.55);
    font-family: Helvetica, sans-serif;
    text-align: center;
    line-height: normal;
    cursor: default;
    border-radius: 6px;
    overflow: hidden;
  }
  .element .number { position:absolute; top:4px; left:6px; font-size:10px; color: rgba(255,255,255,.6); }
  .element .photo {
    width: 60px; height: 60px; border-radius: 50%;
    object-fit: cover; margin-top: 16px; border: 2px solid rgba(255,255,255,.7);
    background:#222;
  }
  .element .name { font-size: 12px; font-weight: bold; margin-top: 8px; padding:0 4px; }
  .element .country { font-size: 9px; color: rgba(255,255,255,.75); margin-top:2px; }
  .element .interest { font-size: 9px; color: rgba(255,255,255,.6); margin-top:2px; }
  .element .worth { font-size: 10px; font-weight:bold; margin-top:4px; }

  #menu {
    position: fixed; bottom: 24px; width: 100%;
    text-align: center; z-index: 20;
  }
  #menu button {
    background: transparent; border: 1px solid rgba(127,255,212,0.6);
    color: rgba(127,255,212,0.9); padding: 8px 18px; margin: 0 4px;
    font-size: 12px; letter-spacing: 1px; cursor: pointer; border-radius: 4px;
  }
  #menu button:hover{ background: rgba(127,255,212,0.15); }
  #menu button.active{ background: rgba(127,255,212,0.9); color:#000; }

  #legend{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:8px; font-size:11px; color:#ccc; z-index:20;
  }
  #legend span.swatch{ display:inline-block; width:12px; height:12px; border-radius:2px; margin-right:4px; vertical-align:middle;}

  #user-badge{
    position:fixed; top:16px; right:16px; z-index:20; font-size:12px; color:#ccc;
    display:flex; align-items:center; gap:8px;
  }
  #user-badge img{ width:24px; height:24px; border-radius:50%; }

  #loading{
    position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    color:#7fffd4; font-size:14px;
  }
</style>
</head>
<body>

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="login-screen">
    <div id="login-card">
      <h1>Welcome Back</h1>
      <p>Sign in with Google to view the data visualization</p>
      <div id="g_id_signin_container"></div>
      <div id="login-error">Sign-in failed. Check the console / your Client ID configuration.</div>
    </div>
  </div>

  <!-- ============ 3D CONTAINER ============ -->
  <div id="container">
    <div id="loading">Loading data from Google Sheet…</div>
    <div id="legend">
      <span class="swatch" style="background:#ef3022"></span>&lt; $100K
      <span class="swatch" style="background:#ffb100;margin-left:10px"></span>$100K–$200K
      <span class="swatch" style="background:#3a9f48;margin-left:10px"></span>&gt; $200K
    </div>
    <div id="user-badge"></div>
    <div id="menu">
      <button id="btn-table">TABLE</button>
      <button id="btn-sphere">SPHERE</button>
      <button id="btn-helix">HELIX</button>
      <button id="btn-grid">GRID</button>
    </div>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
import TWEEN from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@21.0.0/dist/tween.esm.js';

/* =========================================================================
   CONFIG — replace these two values with your own before deploying
   ========================================================================= */
const GOOGLE_CLIENT_ID = '996645152961-isftrulqrutr046jmimfb4mbf3h848p7.apps.googleusercontent.com';
// File > Share > Publish to web > select the sheet/tab > CSV, paste that link below
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTW14MmqIXkOYwe9SEnseXDFvnkj9BZK2ro97Z5uTxXrxvL80kFDET4LAfkb4P9wq4NxOwHXCBjRzcw/pub?gid=1281904460&single=true&output=csv';
/* ========================================================================= */

// ---------------- Google Sign-In ----------------
window.onload = () => {
  if (window.google && GOOGLE_CLIENT_ID.indexOf('YOUR_') !== 0) {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse
    });
    google.accounts.id.renderButton(
      document.getElementById('g_id_signin_container'),
      { theme: 'outline', size: 'large', shape: 'pill' }
    );
  } else {
    // Fallback so you can preview the visualization even before the
    // OAuth client / sheet URL are configured.
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent =
      'Google Client ID not set — click below to preview without sign-in.';
    const btn = document.createElement('button');
    btn.textContent = 'Preview without sign-in';
    btn.style.cssText = 'margin-top:16px;padding:8px 16px;background:#7fffd4;border:none;border-radius:20px;cursor:pointer;';
    btn.onclick = enterApp;
    document.getElementById('login-card').appendChild(btn);
  }
};

function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  document.getElementById('user-badge').innerHTML =
    `<img src="${payload.picture}"><span>${payload.name}</span>`;
  enterApp();
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('container').style.display = 'block';
  loadData();
}

// ---------------- CSV loading & parsing ----------------
async function loadData() {
  try {
    let rows;
    if (SHEET_CSV_URL.indexOf('YOUR_') === 0) {
      // No sheet configured yet — fall back to the bundled sample CSV
      // (data.csv must sit alongside this file) so you can preview locally.
      const res = await fetch('data.csv');
      rows = parseCSV(await res.text());
    } else {
      const res = await fetch(SHEET_CSV_URL);
      rows = parseCSV(await res.text());
    }
    document.getElementById('loading').style.display = 'none';
    init(rows);
    animate();
  } catch (err) {
    document.getElementById('loading').textContent =
      'Could not load data: ' + err.message;
  }
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.length);
  const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = splitCSVLine(lines[i]);
    if (cells.length < headers.length) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (cells[idx] || '').trim());
    out.push(obj);
  }
  return out;
}
function splitCSVLine(line) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}
function netWorthToNumber(str) {
  return parseFloat(str.replace(/[$,]/g, '')) || 0;
}
function worthColor(n) {
  if (n < 100000) return '#ef3022';       // red
  if (n <= 200000) return '#ffb100';      // orange
  return '#3a9f48';                       // green
}

// ---------------- Three.js scene ----------------
let camera, scene, renderer, controls;
let objects = [];
let targets = { table: [], sphere: [], helix: [], grid: [] };

function init(rows) {
  camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
  camera.position.z = 3000;

  scene = new THREE.Scene();

  const COLS = 20, ROWS = 10; // Table: 20 x 10 (per spec)
  const GRID_X = 5, GRID_Y = 4, GRID_Z = 10; // Grid: 5 x 4 x 10 (per spec)

  rows.forEach((row, i) => {
    const netWorthNum = netWorthToNumber(row['net worth'] || row[' net worth'] || '0');

    const el = document.createElement('div');
    el.className = 'element';
    el.style.backgroundColor = hexToRgba(worthColor(netWorthNum), 0.85);

    const number = document.createElement('div');
    number.className = 'number';
    number.textContent = i + 1;
    el.appendChild(number);

    const img = document.createElement('img');
    img.className = 'photo';
    img.src = row.photo || '';
    img.onerror = () => { img.style.visibility = 'hidden'; };
    el.appendChild(img);

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = row.name || '';
    el.appendChild(name);

    const country = document.createElement('div');
    country.className = 'country';
    country.textContent = `${row.country || ''} · Age ${row.age || ''}`;
    el.appendChild(country);

    const interest = document.createElement('div');
    interest.className = 'interest';
    interest.textContent = row.interest || '';
    el.appendChild(interest);

    const worth = document.createElement('div');
    worth.className = 'worth';
    worth.textContent = row['net worth'] || row[' net worth'] || '';
    el.appendChild(worth);

    const object = new CSS3DObject(el);
    object.position.x = Math.random() * 4000 - 2000;
    object.position.y = Math.random() * 4000 - 2000;
    object.position.z = Math.random() * 4000 - 2000;
    scene.add(object);
    objects.push(object);

    // ---- TABLE target: 20 x 10 grid ----
    {
      const col = i % COLS;
      const rIdx = Math.floor(i / COLS);
      const t = new THREE.Object3D();
      t.position.x = (col * 140) - (COLS * 140) / 2 + 70;
      t.position.y = -(rIdx * 180) + (ROWS * 180) / 2 - 90;
      t.position.z = 0;
      targets.table.push(t);
    }

    // ---- SPHERE target ----
    {
      const phi = Math.acos(-1 + (2 * i) / rows.length);
      const theta = Math.sqrt(rows.length * Math.PI) * phi;
      const t = new THREE.Object3D();
      t.position.setFromSphericalCoords(900, phi, theta);
      const vector = new THREE.Vector3();
      vector.copy(t.position).multiplyScalar(2);
      t.lookAt(vector);
      targets.sphere.push(t);
    }

    // ---- DOUBLE HELIX target ----
    {
      const strand = i % 2;               // 0 or 1 -> which of the two strands
      const idxInStrand = Math.floor(i / 2);
      const perStrand = Math.ceil(rows.length / 2);
      const thetaH = idxInStrand * 0.35 + (strand === 1 ? Math.PI : 0); // 180° offset for 2nd strand
      const y = -(idxInStrand * 12) + (perStrand * 12) / 2;
      const t = new THREE.Object3D();
      t.position.x = 700 * Math.sin(thetaH);
      t.position.y = y;
      t.position.z = 700 * Math.cos(thetaH);
      const vector = new THREE.Vector3();
      vector.x = t.position.x * 2;
      vector.y = t.position.y;
      vector.z = t.position.z * 2;
      t.lookAt(vector);
      targets.helix.push(t);
    }

    // ---- GRID target: 5 x 4 x 10 ----
    {
      const t = new THREE.Object3D();
      t.position.x = ((i % GRID_X) * 160) - ((GRID_X - 1) * 160) / 2;
      t.position.y = (-(Math.floor(i / GRID_X) % GRID_Y) * 200) + ((GRID_Y - 1) * 200) / 2;
      t.position.z = (Math.floor(i / (GRID_X * GRID_Y)) * 200) - ((GRID_Z - 1) * 200) / 2;
      targets.grid.push(t);
    }
  });

  renderer = new CSS3DRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('container').appendChild(renderer.domElement);

  controls = new TrackballControls(camera, renderer.domElement);
  controls.minDistance = 500;
  controls.maxDistance = 6000;
  controls.addEventListener('change', render);

  document.getElementById('btn-table').addEventListener('click', () => transform(targets.table, 2000, 'btn-table'));
  document.getElementById('btn-sphere').addEventListener('click', () => transform(targets.sphere, 2000, 'btn-sphere'));
  document.getElementById('btn-helix').addEventListener('click', () => transform(targets.helix, 2000, 'btn-helix'));
  document.getElementById('btn-grid').addEventListener('click', () => transform(targets.grid, 2000, 'btn-grid'));

  transform(targets.table, 2000, 'btn-table');

  window.addEventListener('resize', onWindowResize);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function transform(targetsArr, duration, activeBtnId) {
  document.querySelectorAll('#menu button').forEach(b => b.classList.remove('active'));
  if (activeBtnId) document.getElementById(activeBtnId).classList.add('active');

  TWEEN.removeAll();
  for (let i = 0; i < objects.length; i++) {
    const object = objects[i];
    const target = targetsArr[i];
    new TWEEN.Tween(object.position)
      .to({ x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration)
      .easing(TWEEN.Easing.Exponential.InOut)
      .start();
    new TWEEN.Tween(object.rotation)
      .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration)
      .easing(TWEEN.Easing.Exponential.InOut)
      .start();
  }
  new TWEEN.Tween({}).to({}, duration * 2).onUpdate(render).start();
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  render();
}

function animate(time) {
  requestAnimationFrame(animate);
  TWEEN.update(time);
  controls.update();
  render();
}
function render() {
  renderer.render(scene, camera);
}
</script>
</body>
</html>
